# ---------------------------------------------------------------------------
# Lazada Dashboard stack (Airflow + FastAPI)
#
#   docker compose build
#   docker compose up airflow-init    # initialize metadata DB + admin user (รันครั้งเดียว)
#   docker compose up -d              # start ทุก service
#
#   Airflow UI    -> http://localhost:8080   (admin / admin)
#   Dashboard API -> http://localhost:8000
# ---------------------------------------------------------------------------

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  image: lazada-airflow:latest
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # Shared secret_key เพื่อให้ webserver ดึง log จาก scheduler/worker ได้
    AIRFLOW__WEBSERVER__SECRET_KEY: "${AIRFLOW_SECRET_KEY:-lazada-airflow-shared-secret-change-me}"
    AIRFLOW_UID: "${AIRFLOW_UID:-50000}"
    LAZADA_PROJECT_DIR: /opt/airflow/project
    LAZADA_STAGING_DIR: /opt/airflow/project/data/_staging
    LAZADA_OUTPUT_PATH: /opt/airflow/project/data/analytics/dashboard_data.json
    LAZADA_ROWS_PER_FILE: "${LAZADA_ROWS_PER_FILE:-500000}"
    PYTHONPATH: /opt/airflow/project
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    KAGGLE_USERNAME: "${KAGGLE_USERNAME:-}"
    KAGGLE_KEY: "${KAGGLE_KEY:-}"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./:/opt/airflow/project
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        mkdir -p /opt/airflow/{logs,dags,plugins}
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/{logs,dags,plugins} || true
        airflow db migrate
        airflow users create \
          --username "${_AIRFLOW_WWW_USER_USERNAME:-admin}" \
          --password "${_AIRFLOW_WWW_USER_PASSWORD:-admin}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
        echo "Airflow initialized."
    user: "0:0"
    restart: "no"

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends
      airflow-init:
        condition: service_completed_successfully

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------
  # FastAPI dashboard — อ่าน dashboard_data.json ที่ Airflow generate ไว้
  # ---------------------------------------------------------------------
  dashboard-api:
    image: lazada-airflow:latest    # ใช้ image เดียวกับ Airflow (มี deps ครบ)
    working_dir: /opt/airflow/project
    entrypoint: /bin/bash
    command:
      - -c
      - "uvicorn backend.app:app --host 0.0.0.0 --port 8000"
    environment:
      PYTHONPATH: /opt/airflow/project
    volumes:
      - ./:/opt/airflow/project
    ports:
      - "8000:8000"
    user: "${AIRFLOW_UID:-50000}:0"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db-volume:
